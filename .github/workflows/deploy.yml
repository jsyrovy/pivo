name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["pivni-valka", "untappd-pairing"]
    types: [completed]
  push:
    paths:
      - "templates/**"
      - "web/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: make publish-all
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: echo "Deploy attempt 1 failed, retrying..." && sleep 10
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        id: deploy-retry-1
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deploy-retry-1.outcome == 'failure'
        run: echo "Deploy attempt 2 failed, retrying..." && sleep 30
      - if: steps.deployment.outcome == 'failure' && steps.deploy-retry-1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        id: deploy-retry-2
